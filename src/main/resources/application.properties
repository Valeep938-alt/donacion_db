spring.application.name=donacion

# ═══════════════════════════════════════════════════════════════
# Sistema de Gestión de Vacunación — SENA CIMM
# Configuración Spring Boot + PostgreSQL
# ═══════════════════════════════════════════════════════════════

# ── Servidor ────────────────────────────────────────────────────
server.port=8080
# La app responde en http://localhost:8080/

# ── Base de datos PostgreSQL (pgAdmin 4) ─────────────────────────
# Crea la BD en pgAdmin 4: clic derecho en Databases → Create → Database
# Nombre: vacunacion_db  (igual al proyecto original)
spring.datasource.url=jdbc:postgresql://localhost:5432/donacion_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones HikariCP (incluido con Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────────
# update: Hibernate crea/adapta las tablas automáticamente (desarrollo)
# validate: solo verifica estructura (producción)
spring.jpa.hibernate.ddl-auto=update
# Muestra el SQL generado (útil para aprender y depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Thymeleaf ────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Internacionalización ─────────────────────────────────────────
# Los mismos messages.properties del proyecto Servlets — sin cambios
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ── Spring Security ──────────────────────────────────────────────
# Desactiva el usuario generado automáticamente (usamos nuestra BD)
spring.security.user.name=admin
spring.security.user.password=admin

# ── Logging ──────────────────────────────────────────────────────
logging.level.co.sena.cimm.adso=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ── Multipart (subida de archivos) ───────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Recursos estáticos externos (uploads) ──────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
