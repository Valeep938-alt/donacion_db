<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${donante.nombres} + ' ' + ${donante.apellidos} + ' - BloodBank SENA'">Detalle Donante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <div th:replace="~{fragments/sidebar :: sidebar-css}"></div>

    <style>
        :root {
            --sage-green: #8B9D83;
            --sage-dark: #6B7D63;
            --terracotta: #D4A574;
            --terracotta-light: #E8C4A0;
            --cream: #FAF6F0;
            --beige: #F0E8DC;
            --warm-white: #FDFCFA;
            --dark: #3D4A3D;
            --text-muted: #7A8A7A;
            --danger: #C44536;
            --danger-light: #FDE8E6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            overflow: hidden;
        }

        h1, h2, h3, h4, h5, h6 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 500;
        }

        /* ===== FONDO BLUR - Lista de donantes difuminada ===== */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 74, 61, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }

        /* ===== MODAL CARD ===== */
        .modal-card {
            background: var(--warm-white);
            border-radius: 24px;
            border: 1px solid var(--beige);
            box-shadow: 0 25px 60px rgba(61, 74, 61, 0.25);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            animation: modalIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== MODAL HEADER ===== */
        .modal-header-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--beige);
            background: linear-gradient(135deg, var(--sage-green) 0%, var(--sage-dark) 100%);
        }

        .modal-header-custom h3 {
            color: white;
            font-size: 1.1rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .btn-close-custom {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .btn-close-custom:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* ===== MODAL BODY - DOS COLUMNAS ===== */
        .modal-body-custom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 420px;
        }

        @media (max-width: 768px) {
            .modal-body-custom {
                grid-template-columns: 1fr;
            }
        }

        /* ===== COLUMNA IZQUIERDA - Datos ===== */
        .col-datos {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .info-group {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: var(--cream);
            border-radius: 14px;
            border: 1px solid var(--beige);
            transition: all 0.3s ease;
        }

        .info-group:hover {
            background: var(--beige);
            transform: translateX(4px);
        }

        .info-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .info-icon.sage {
            background: linear-gradient(135deg, var(--sage-green) 0%, var(--sage-dark) 100%);
        }

        .info-icon.danger {
            background: linear-gradient(135deg, var(--danger) 0%, #a03528 100%);
        }

        .info-text {
            flex: 1;
        }

        .info-text label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .info-text span {
            font-size: 0.95rem;
            color: var(--dark);
            font-weight: 500;
        }

        /* ===== COLUMNA DERECHA - Visual ===== */
        .col-visual {
            background: linear-gradient(160deg, var(--cream) 0%, var(--beige) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .col-visual::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139,157,131,0.08) 0%, transparent 70%);
            animation: pulseBg 4s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .visual-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--terracotta) 0%, var(--sage-green) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.3);
            animation: floatCircle 3s ease-in-out infinite;
        }

        @keyframes floatCircle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .visual-circle i {
            font-size: 4rem;
            color: white;
        }

        .visual-circle .blood-type {
            position: absolute;
            bottom: -15px;
            background: var(--warm-white);
            color: var(--terracotta);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--beige);
        }

        .visual-stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            z-index: 1;
        }

        .visual-stat {
            text-align: center;
        }

        .visual-stat .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--sage-dark);
            font-family: 'Playfair Display', serif;
        }

        .visual-stat .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== MODAL FOOTER ===== */
        .modal-footer-custom {
            padding: 1.2rem 2rem;
            border-top: 1px solid var(--beige);
            background: var(--cream);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .modal-footer-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--dark);
            font-weight: 600;
        }

        .modal-footer-title i {
            color: var(--terracotta);
            margin-right: 0.5rem;
        }

        .btn-group-custom {
            display: flex;
            gap: 0.6rem;
        }

        .btn-modal {
            padding: 0.6rem 1.4rem;
            border-radius: 25px;
            border: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .btn-modal-edit {
            background: var(--terracotta);
            color: white;
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
        }

        .btn-modal-edit:hover {
            background: var(--sage-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(139, 157, 131, 0.3);
        }

        .btn-modal-delete {
            background: var(--danger-light);
            color: var(--danger);
            border: 1px solid rgba(196, 69, 54, 0.2);
        }

        .btn-modal-delete:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        .btn-modal-back {
            background: var(--beige);
            color: var(--dark);
        }

        .btn-modal-back:hover {
            background: var(--sage-green);
            color: white;
        }

        /* ===== BADGE ESTADO ===== */
        .badge-estado-modal {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-estado-modal.activo {
            background: rgba(139, 157, 131, 0.12);
            color: var(--sage-green);
        }

        .badge-estado-modal.inactivo {
            background: rgba(196, 69, 54, 0.08);
            color: var(--danger);
        }

        .badge-estado-modal .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .modal-card {
                max-width: 100%;
                margin: 0.5rem;
            }
            .col-datos {
                padding: 1.5rem;
            }
            .visual-circle {
                width: 140px;
                height: 140px;
            }
            .visual-circle i {
                font-size: 3rem;
            }
            .modal-footer-custom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Backdrop con blur - fondo de lista -->
    <div class="backdrop">
        <div class="modal-card">

            <!-- Header -->
            <div class="modal-header-custom">
                <h3>
                    <i class="bi bi-person-badge"></i>
                    Detalle del Donante
                </h3>
                <a href="/donantes" class="btn-close-custom" title="Cerrar">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>

            <!-- Body - Dos columnas -->
            <div class="modal-body-custom">

                <!-- Columna Izquierda: Datos -->
                <div class="col-datos">

                    <div class="info-group">
                        <div class="info-icon sage">
                            <i class="bi bi-person"></i>
                        </div>
                        <div class="info-text">
                            <label>Nombre Completo</label>
                            <span th:text="${donante.nombres} + ' ' + ${donante.apellidos}">Juan Pérez García</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon">
                            <i class="bi bi-card-text"></i>
                        </div>
                        <div class="info-text">
                            <label>Documento</label>
                            <span th:text="${donante.documento}">1234567890</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon sage">
                            <i class="bi bi-calendar-event"></i>
                        </div>
                        <div class="info-text">
                            <label>Fecha de Nacimiento</label>
                            <span th:text="${donante.fechaNacimiento}">15/03/1995</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon">
                            <i class="bi bi-speedometer2"></i>
                        </div>
                        <div class="info-text">
                            <label>Peso</label>
                            <span th:text="${donante.peso} + ' kg'">72.5 kg</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon sage">
                            <i class="bi bi-telephone"></i>
                        </div>
                        <div class="info-text">
                            <label>Teléfono</label>
                            <span th:text="${donante.telefono}">300 123 4567</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon">
                            <i class="bi bi-envelope"></i>
                        </div>
                        <div class="info-text">
                            <label>Correo Electrónico</label>
                            <span th:text="${donante.correo}">juan.perez@email.com</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon sage">
                            <i class="bi bi-geo-alt"></i>
                        </div>
                        <div class="info-text">
                            <label>Dirección</label>
                            <span th:text="${donante.direccion}">Calle 123 #45-67, Bogotá</span>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-icon danger">
                            <i class="bi bi-file-earmark-check"></i>
                        </div>
                        <div class="info-text">
                            <label>Consentimiento</label>
                            <span th:text="${donante.aceptaConsentimiento} ? 'Aceptado' : 'No aceptado'">Aceptado</span>
                        </div>
                    </div>

                </div>

                <!-- Columna Derecha: Visual -->
                <div class="col-visual">
                    <div class="visual-circle">
                        <i class="bi bi-droplet-fill"></i>
                        <div class="blood-type" th:text="${donante.tipoSangre.descripcion}">O+</div>
                    </div>

                    <div class="visual-stats">
                        <div class="visual-stat">
                            <div class="number" th:text="${donante.edad}">28</div>
                            <div class="label">Años</div>
                        </div>
                        <div class="visual-stat">
                            <div class="number">5</div>
                            <div class="label">Donaciones</div>
                        </div>
                        <div class="visual-stat">
                            <div class="number" th:text="${donante.peso}">72</div>
                            <div class="label">Kg</div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Footer -->
            <div class="modal-footer-custom">
                <div class="modal-footer-title">
                    <i class="bi bi-heart-pulse"></i>
                    <span th:text="${donante.nombres} + ' ' + ${donante.apellidos}">Juan Pérez García</span>
                    <span class="badge-estado-modal activo ms-2">
                        <span class="dot"></span> Activo
                    </span>
                </div>
                <div class="btn-group-custom">
                    <a th:href="@{/donantes}" class="btn-modal btn-modal-back">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                    <a th:href="@{/donantes/editar/{id}(id=${donante.id})}" class="btn-modal btn-modal-edit">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a th:href="@{/donantes/eliminar/{id}(id=${donante.id})}" 
                       class="btn-modal btn-modal-delete"
                       onclick="return confirm('¿Está seguro de eliminar este donante?')">
                        <i class="bi bi-trash"></i> Eliminar
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/sidebar :: sidebar-js}"></div>

</body>
</html>
